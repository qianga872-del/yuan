<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kiểm Tra Tiếng Trung (Nghe & Nói)</title>
  <style>
    :root { --primary: #009688; --bg: #f4f6f8; --card: #fff; --text: #333; }
    body { font-family: 'Roboto', 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); }
    .screen { display: none; max-width: 600px; margin: 0 auto; }
    .screen.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; margin-bottom: 20px; }
    h1 { color: var(--primary); font-size: 22px; margin-bottom: 5px; }
    h3 { color: #666; font-size: 16px; margin-top: 0; font-weight: normal; }
    
    .input-group { margin-bottom: 15px; text-align: left; }
    label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #555; }
    input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; background: #fafafa; }
    
    .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; width: 100%; cursor: pointer; margin-top: 10px; font-weight: bold; transition: background 0.2s; }
    .btn:active { transform: scale(0.98); background: #00796b; }
    .btn-secondary { background: #607d8b; }
    
    /* 题目样式 */
    .q-header { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
    .q-cn { font-size: 20px; font-weight: bold; color: #d32f2f; margin-bottom: 8px; line-height: 1.4; }
    .q-vi { font-size: 14px; color: #555; font-style: italic; line-height: 1.4; }
    
    .audio-box { background: #e0f2f1; padding: 15px; border-radius: 50px; display: inline-flex; align-items: center; gap: 10px; margin: 10px 0; cursor: pointer; border: 2px solid transparent; }
    .audio-box.playing { border-color: var(--primary); background: #b2dfdb; }
    
    /* 选项样式 */
    .option { background: #fff; border: 2px solid #eee; padding: 15px; margin: 10px 0; border-radius: 10px; font-size: 18px; cursor: pointer; transition: all 0.2s; display: flex; justify-content: space-between; }
    .option:hover { background: #f9f9f9; }
    .option.selected { border-color: var(--primary); background: #e0f2f1; color: #00695c; font-weight: bold; }
